<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <style>
        /* 1. Center the search bar */
        .search-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            gap: 10px;
            background-color: #f4f4f4;
        }

        input {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 2. The Grid System for movies */
        #list {
            display: grid;
            /* Creates columns that are at least 200px wide, filling the space */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* 3. Force images to be uniform */
        #list img {
            width: 100%;       /* Makes all images the same width as the grid column */
            height: 300px;     /* Forces a consistent height */
            object-fit: cover; /* Prevents stretching by cropping the edges slightly */
            border-radius: 8px;
            display: block;
        }

        /* Styling for the container around each movie image/title */
        .movie-card {
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" placeholder="Search movies...">
        <button>Search</button>
    </div>

    <div id="list">
        <!-- Movies generated by movie.js will appear here -->
    </div>

    <script src="movie.js"></script>
</body>
</html>
