<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <style>
        /* 1. Basic Reset and Font */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* 2. Style the Search Area */
        .search-box {
            margin-bottom: 30px;
        }

        input {
            padding: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 3. The Grid System (This puts images/data in order) */
        #list {
            display: grid;
            /* Every item will be exactly 250px wide */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* 4. Style each weather result */
        .weather-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 150px; /* Consistent width */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h2 {
            margin: 10px 0;
            color: #333;
        }
        /* Style for city photos */
        /* Style for the Google Map */
.city-map {
    width: 100%;       /* Fills the card width */
    height: 250px;     /* Fixed height for the map */
    border: none;      /* Removes the default border */
    border-radius: 8px;
    margin-top: 15px;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
}

.weather-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    width: 300px; /* Ensures the card is wide enough for the map */
}
    </style>
</head>
<body>

    <div class="search-box">
        <input placeholder="Enter city name">
        <button>Search</button>
    </div>

    <div id="list">
        <!-- Weather results will appear here in a grid -->
    </div>

    <script src="weather.js"></script>
</body>
</html>
