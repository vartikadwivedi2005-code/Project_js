<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            background-color: #f8f9fa;
            margin: 0;
            padding: 80px 20px 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .cart-card {
            background-color: white;
            border-radius: 12px;
            width: 260px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cart-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .cart-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f1f3f5;
        }

        .cart-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #212529;
            margin: 12px 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-card h3 {
            font-size: 16px;
            color: #0353a4;
            margin: 0 0 8px 0;
        }

        .cart-card h4 {
            font-size: 13px;
            font-weight: 500;
            color: #37b24d;
            margin: 0 0 6px 0;
        }

        .cart-card h5 {
            font-size: 13px;
            font-weight: 500;
            color: #fcc419;
            margin: 0 0 14px 0;
        }

        .cart-card button {
            width: 100%;
            background-color: #000000;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cart-card button:hover {
            background-color: #333333;
        }

        .nav-link button {
            position: fixed;
            top: 20px;
            left: 30px;
            background-color: white;
            color: #212529;
            border: 1px solid #ced4da;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: background-color 0.2s ease, transform 0.1s ease;
            z-index: 1000;
        }

        .nav-link button:hover {
            background-color: #f1f3f5;
        }

        .nav-link button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
   
    <a href="product.html" class="nav-link">   
        <button>Back to Shop</button>
    </a>

    <script>
        let data = JSON.parse(localStorage.getItem("item"));
        console.log("Your cart items:", data);
      
        let body = document.querySelector("body");
      
        data.map((a) => {
            body.innerHTML += `
            <div class="cart-card">
                <div>
                    <img src="${a.thumbnail}">
                    <h2>${a.title}</h2>
                    <h3>$${a.price}</h3>
                    <h4>✨ ${a.return}</h4>
                    <h5>⭐ ${a.rating}</h5>
                </div>
                <button onclick="addToCart(${a.id})">Add to Cart</button>
            </div>
            `;
        });
    </script>
</body>
</html>
